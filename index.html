    <script>
         const cursor = document.getElementById('cursor-effect');
            document.addEventListener('mousemove', (e) => {
        // Usiamo requestAnimationFrame per prestazioni migliori durante lo scroll
        requestAnimationFrame(() => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
             });
         });
        
        //situe burger menu
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav-menu');

        burger.addEventListener('click', () => {
            nav.classList.toggle('active');
            burger.classList.toggle('active'); // Fa incrociare le linee e le colora di arancione
        });

        // Chiudi il menu quando clicchi un link
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', () => {
                nav.classList.remove('active');
                burger.classList.remove('active');
            });
        });
// situe cursore
const heroLinks = document.querySelectorAll('.hero-link');
const cursorNode = document.getElementById('cursor-effect');

heroLinks.forEach(link => {
    link.addEventListener('mouseenter', () => {
        cursorNode.classList.add('cursor-hero');
    });

    link.addEventListener('mouseleave', () => {
        cursorNode.classList.remove('cursor-hero');
    });
});

        // Situa delle immagini landing page
   
const spawnContainer = document.getElementById('image-spawn-container');
const imagesList = [
    'links/dumbo.jpg',
    'links/guerrilla.png',
    'links/costa copta.jpg',
    'links/GattiViola_cartaz.pdf'
];

let activeImages = [];
let scrollPosition = 0;
let imgIndex = 0;
const pixelsPerSpawn = 250; 
let lastSpawnPoint = 0;
let lastTouchY = 0; // Per calcolare lo scroll su mobile

// FUNZIONE UNIFICATA DI GESTIONE SCROLL
function handleUniversalScroll(deltaY) {
    scrollPosition += deltaY;
    
    if (Math.abs(scrollPosition - lastSpawnPoint) > pixelsPerSpawn) {
        spawnImageAtCenter();
        lastSpawnPoint = scrollPosition;
    }
    updateImagesPosition();
}

// Desktop: rotella del mouse
window.addEventListener('wheel', (e) => {
    handleUniversalScroll(e.deltaY);
});

// Mobile: movimento del dito
window.addEventListener('touchstart', (e) => {
    lastTouchY = e.touches[0].clientY;
}, {passive: true});

window.addEventListener('touchmove', (e) => {
    const touchY = e.touches[0].clientY;
    const deltaY = (lastTouchY - touchY) * 2; // Moltiplicatore per simulare la wheel
    lastTouchY = touchY;
    
    handleUniversalScroll(deltaY);
}, {passive: true});

function spawnImageAtCenter() {
    const imgElement = document.createElement('img');
    imgElement.src = imagesList[imgIndex];
    imgElement.className = 'spawned-img';
    
    const angle = Math.random() * Math.PI * 2;
    
    const imgObj = {
        element: imgElement,
        angle: angle,
        spawnOffset: scrollPosition 
    };

    spawnContainer.appendChild(imgElement);
    activeImages.push(imgObj);
    imgIndex = (imgIndex + 1) % imagesList.length;

    if (activeImages.length > 15) {
        const old = activeImages.shift();
        old.element.remove();
    }
}

function updateImagesPosition() {
    activeImages.forEach((img) => {
        const distance = (scrollPosition - img.spawnOffset) * 0.6; 
        const tx = Math.cos(img.angle) * distance;
        const ty = Math.sin(img.angle) * distance;
        
        const scale = Math.min(Math.max(distance / 300, 0), 1);
        const opacity = Math.min(Math.max(distance / 150, 0), 1);

        img.element.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(${scale})`;
        img.element.style.opacity = opacity;
    });
}
    </script>
    <script src="https://player.vimeo.com/api/player.js"></script>
